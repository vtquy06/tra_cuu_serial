<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Tồn Kho BCCS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ẩn thanh cuộn của trang gốc */
            background-color: #f4f6f9; 
        }
        .iframe-container {
            position: absolute;
            top: -50px; /* Đẩy iframe lên 50px để giấu hoàn toàn banner cảnh báo của Google */
            left: 0;
            width: 100%;
            /* Tăng chiều cao thêm 50px để bù lại phần bị đẩy lên, giúp app không bị hụt chân trang */
            height: calc(100% + 50px); 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <!-- Thay link Web App đã được cấu hình ALLOWALL của bạn vào đây -->
        <iframe src="https://script.google.com/macros/s/AKfycbyaVmRWIbr2BFvO8OWfy9oV-c2HvQPaOemlXa0htkchuBZh9QU3zpfu4KLq-MNA3LZh/exec"></iframe>
    </div>

</body>
</html>
